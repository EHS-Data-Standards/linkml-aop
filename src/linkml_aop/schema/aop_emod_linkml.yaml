name: aopwiki-emod
id: http://example.org/aopwiki-emod
default_prefix: http://example.org/aopwiki-emod/
title: AOP Wiki Data Model with EMOD
description: >-
  This is a LinkML schema for the AOP-Wiki data model,
  extended with EMOD concepts.
prefixes:
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#
  foaf: http://xmlns.com/foaf/0.1/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
default_range: string

imports:
  - linkml:types

# Slot defintions shared across multiple classes
slots:
  changed_at:
    description: Timestamp of when the record was last changed
    range: datetime
  created_at:
    description: Timestamp of when the record was created
    range: datetime
  updated_at:
    description: Timestamp of when the record was last updated
    range: datetime

# Class definitions
classes:
  Aop:
    description: >-
      An AOP describes a sequence of events starting with initial interaction(s) between a stressor and a biomolecule within an organism that causes a perturbation in its biology (i.e., molecular initiating event, MIE), which can progress through a dependent series of intermediate key events (KEs) and culminate in an adverse outcome (AO) considered relevant to risk assessment or regulatory decision-making. AOPs are composed of a causal sequence of upstream to downstream KEs, representing a cascading series of measurable biological changes that can be expected to occur if the perturbation is sufficiently severe (i.e., in terms of potency, duration, frequency) to drive the pathway all the way to the AO. Importantly, AOPs do not describe every detail of the biology but instead focus on describing critical steps or check-points along the path to adversity, which are both measurable and have potential predictive value for regulatory application.
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      title:
      short_name:
      corresponding_author_id:
        range: User
      abstract:
      authors:
      applicability_of_the_aop:
      key_event_essentiality:
      weight_of_evidence_summary:
      quantitative_considerations:
      optional_considerations:
      overall_assessment:
      background:
      oecd_project:
      oecd_status_id:
        range: OecdStatus
      graphical_representation_image_uid:
      legacy:
        range: integer
      overall_assessment_file_uid:
      changed_at:
      development_strategy:
      known_modulating_factors:
      assigned_license_id:
        range: AssignedLicense
      handbook_id:
        range: Handbook
      completion_score:
      mean_ker_score:
      mean_event_score:
      url_links:
        multivalued: true
        range: UrlLink
      prototypical_stressors:
        multivalued: true
        range: AopToPrototypicalStressor
      events:
        multivalued: true
        range: AopToEvent
      ke_relationships:
        multivalued: true
        range: AopToKeRelationship
      life_stages:
        multivalued: true
        range: AopToLifeStage
      sexes:
        multivalued: true
        range: AopToSex
      taxons:
        multivalued: true
        range: AopToTaxon
  Event:
    description: >-
      A change in biological or physiological state that is both measurable and essential to the progression of a defined biological perturbation leading to a specific adverse outcome.
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      title:
        description: A descriptive phrase which defines a discrete biological change that can be measured.
      short_name:
        description: A reasonable abbreviation of the Key Event title, used in labelling throughout AOP-Wiki.
      biological_organization_id:
        description: The level of biological organization at which the Key Event occurs (e.g., molecular, cellular, tissue, organ, organism).
        range: LevelOfBiologicalOrganization
      how_it_works:
        description: The mechanistic basis explaining how perturbation of this Key Event leads to downstream effects.
      measured_or_detected:
        description: A description of the type(s) of measurements that can be employed to evaluate the Key Event and the relative level of scientific confidence in those measurements.
      supporting_tax_evidence:
        description: Evidence describing the taxonomic applicability of the Key Event, using Latin or common names of species or broader taxonomic groupings.
      evidence_for_chemical_initiation:
        description: Documentation of how specific prototypical stressors (generally chemicals) can trigger or perturb this Key Event.
      examples_using_ao:
        description: Examples illustrating the regulatory significance of this Key Event when it serves as an adverse outcome.
      references:
        description: Literature cited in support of this Key Event description.
      definition:
        description: A description of the biological state being observed or measured, the biological compartment in which it is measured, and its general role in the biology.
      organ_term_id:
        description: The organ or tissue in which the Key Event takes place.
        range: OrganTerm
      cell_term_id:
        description: The cell type in which the Key Event takes place.
        range: CellTerm
      completion_score:
        description: Calculated metric indicating how complete the Key Event documentation is.
      integration_score:
        description: Calculated metric for integration and priority assessment of the Key Event.
      has_method_text:
        description: Indicates whether method text has been provided for this Key Event.
      event_components:
        multivalued: true
        range: EventComponent
      assays:
        multivalued: true
        range: Assay
      observations:
        multivalued: true
        range: Observation
      aops:
        multivalued: true
        range: AopToEvent
      life_stages:
        multivalued: true
        range: EventToLifeStage
      sexes:
        multivalued: true
        range: EventToSex
      taxons:
        multivalued: true
        range: EventToTaxon
      bio_target_families:
        multivalued: true
        range: EventToBioTargetFamily
  KeRelationship:
    description: >-
      A scientifically-based relationship that connects one key event to another, defines a causal and predictive relationship between the upstream and downstream event, and thereby facilitates inference or extrapolation of the state of the downstream key event from the known, measured,or predicted state of the upstream key event.
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      upstream_event_id:
        range: Event
      downstream_event_id:
        range: Event
      how_it_works:
      biological_plausibility:
      empirical_support:
      uncertainties:
      quantitative_understanding:
      taxon_evidence:
      weight_of_evidence:
      response_relationship:
      time_scale:
      modulating_factors:
      known_loops:
      evidence_collection_strategy:
      references:
      completion_score:
      aops:
        multivalued: true
        range: AopToKeRelationship
      taxons:
        multivalued: true
        range: KeRelationshipToTaxon
      sexes:
        multivalued: true
        range: KeRelationshipToSex
      life_stages:
        multivalued: true
        range: KeRelationshipToLifeStage
  Assay:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      title:
      description:
      citation_id:
      detection_technology:
      biological_action_id:
        range: BiologicalAction
      external_assay_id:
      batch_import_id:
      objects:
        multivalued: true
        range: BiologicalObject
      processes:
        multivalued: true
        range: BiologicalProcess
      taxon_terms:
        multivalued: true
        range: TaxonTerm
      events:
        multivalued: true
        range: Event
      bio_target_families:
        multivalued: true
        range: AssayToBioTargetFamily
  Observation:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      biological_action_id:
        range: BiologicalAction
      biological_process_id:
        range: BiologicalProcess
      biological_object_id:
        range: BiologicalObject
      assay_id:
        range: Assay
      batch_import_id:
      stressor_id:
      phenotype:
      events:
        multivalued: true
        range: Event
      citations:
        multivalued: true
        range: ObservationToCitation
  Evidence:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      upstream_observation_id:
        range: Observation
      downstream_observation_id:
        range: Observation
      citation_id:
      taxon_term_id:
        range: TaxonTerm
      sex_term_id:
        range: SexTerm
      life_stage_term_id:
        range: LifeStageTerm
      relationship_id:
        range: KeRelationship
      experimental_design:
      notes:
  Stressor:
    description: >-
      An external or internal factor that induces a perturbation to a biological system, potentially initiating a molecular initiating event (MIE) but could also impact a biological process represented by a key event. Stressors may include chemical, physical, or biological agents capable of eliciting measurable changes in the biological system relevant to the AOP.
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      name:
      aops:
        multivalued: true
        range: AopToPrototypicalStressor
  Citation:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      doi:
      title:
      authors:
      journal:
      year:
  BiologicalAction:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      term:
        range: BiologicalActionEnum
      source:
      source_id:
  BiologicalObject:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
        identifier: true
        range: integer
      term:
      source:
        range: BiologicalObjectSourceEnum
      source_id:
      description:
      url:
  BiologicalProcess:
    slots:
      - created_at
      - updated_at
    attributes:
      id:
